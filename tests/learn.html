<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>FHIR Learn — Trilha</title>
<style>
  :root{
    --bg:#0b1020;--bg2:#151c3a;--card:#121a33;--line:#23305c;--muted:#c9d3f5;
    --txt:#e9eefc;--accent:#6ee7b7;--accent2:#5b86ff;--gold:#fcd34d;--danger:#fca5a5;
    --good:#1f9e6d;--bad:#9e1f1f;
  }
  *{box-sizing:border-box}
  body{margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,Ubuntu,'Helvetica Neue',Arial,sans-serif;
    background:linear-gradient(120deg,#0b1020,#151c3a);color:var(--txt);min-height:100vh}
  a{color:var(--accent2)}
  header{position:sticky;top:0;z-index:5;background:rgba(11,16,32,.92);backdrop-filter:blur(8px);
    border-bottom:1px solid var(--line);padding:10px 16px}
  .hbar{max-width:1100px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap}
  .brand{display:flex;align-items:center;gap:10px;font-weight:800;font-size:18px}
  .brand .logo{width:30px;height:30px;border-radius:9px;background:linear-gradient(135deg,#6ee7b7,#5b86ff);
    display:grid;place-items:center;font-size:16px}
  .stats{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
  .chip{display:flex;align-items:center;gap:6px;background:#0f1530;border:1px solid var(--line);
    border-radius:999px;padding:6px 12px;font-weight:700;font-size:14px}
  .chip.streak{color:var(--gold)} .chip.xp{color:var(--accent)} .chip.due{color:#a5b4fc}
  .iconbtn{background:#0f1530;border:1px solid var(--line);color:var(--txt);border-radius:10px;
    padding:7px 11px;cursor:pointer;font-size:14px}
  .iconbtn:hover{border-color:var(--accent2)}
  .container{max-width:1100px;margin:22px auto;padding:0 16px}

  /* module tabs */
  .modtabs{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px}
  .modtab{flex:1;min-width:120px;background:#0f1530;border:1px solid var(--line);color:var(--muted);
    border-radius:14px;padding:10px 12px;cursor:pointer;font-weight:700;font-size:14px;display:flex;
    align-items:center;justify-content:space-between;gap:8px;transition:border-color .12s,transform .12s}
  .modtab:hover{transform:translateY(-1px);border-color:var(--accent2)}
  .modtab.act{background:#1a2e4f;border-color:var(--accent2);color:#fff}
  .modtab .modpct{font-size:12px;background:#0b1020;border:1px solid var(--line);border-radius:999px;padding:2px 8px;color:var(--accent)}
  /* readiness */
  .readiness{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:16px 18px;margin-bottom:18px}
  .readiness h2{margin:0 0 4px;font-size:16px}
  .rd-sub{color:var(--muted);font-size:13px;margin:0 0 12px}
  .rd-grid{display:flex;gap:18px;flex-wrap:wrap;align-items:center}
  .ring{--p:0;width:96px;height:96px;border-radius:50%;flex-shrink:0;
    background:conic-gradient(var(--accent) calc(var(--p)*1%), #1a2346 0);
    display:grid;place-items:center}
  .ring .inner{width:74px;height:74px;border-radius:50%;background:var(--card);display:grid;place-items:center;
    font-weight:800;font-size:20px}
  .rd-info{flex:1;min-width:220px}
  .barline{display:flex;align-items:center;gap:10px;margin:7px 0;font-size:13px}
  .barline .lbl{width:120px;color:var(--muted);flex-shrink:0}
  .bar{flex:1;height:9px;background:#0f1530;border-radius:6px;overflow:hidden}
  .bar > span{display:block;height:100%;border-radius:6px;background:var(--accent);transition:width .5s}
  .cta-review{display:inline-flex;align-items:center;gap:8px;background:#1a2e4f;border:1px solid var(--accent2);
    color:#dbe6ff;border-radius:12px;padding:10px 16px;font-weight:800;cursor:pointer;font-size:15px}
  .cta-review:hover{transform:translateY(-1px)}
  .cta-review.hot{background:#2a1f0a;border-color:var(--gold);color:#ffe9a8}
  .cta-review:disabled{opacity:.5;cursor:default;transform:none}

  /* tree */
  .unit{margin:26px 0}
  .unit-head{display:flex;align-items:center;gap:12px;padding:12px 16px;border-radius:14px;
    background:linear-gradient(90deg,rgba(110,231,183,.10),transparent);border:1px solid var(--line);margin-bottom:8px}
  .unit-head .u-no{font-size:12px;letter-spacing:.08em;color:var(--muted);text-transform:uppercase}
  .unit-head h3{margin:2px 0 0;font-size:17px}
  .lessons{display:flex;flex-direction:column;align-items:center;gap:2px;padding:8px 0}
  .node{position:relative;display:flex;flex-direction:column;align-items:center;gap:6px;padding:8px 0}
  .node .bubble{width:78px;height:78px;border-radius:50%;display:grid;place-items:center;font-size:30px;
    border:3px solid var(--line);background:#0f1530;cursor:pointer;transition:transform .12s, box-shadow .2s;position:relative}
  .node .bubble:hover{transform:translateY(-2px)}
  .node.locked .bubble{cursor:not-allowed;opacity:.45;filter:grayscale(.6)}
  .node.locked .bubble:hover{transform:none}
  .node.done .bubble{box-shadow:0 0 0 4px rgba(110,231,183,.18)}
  .node.checkpoint .bubble{background:#1a2e4f;border-color:#5b86ff;border-style:dashed}
  .node.checkpoint.mastered .bubble{background:#2a1f0a;border-color:var(--gold);border-style:solid;box-shadow:0 0 0 4px rgba(252,211,77,.2)}
  .chip.concepts{color:#c4b5fd}
  .node .name{font-size:13px;color:var(--muted);text-align:center;max-width:200px}
  .node .crowns{position:absolute;top:-6px;right:-6px;font-size:13px;background:#0f1530;border:1px solid var(--line);
    border-radius:999px;padding:1px 7px;font-weight:700}
  .connector{width:3px;height:18px;background:var(--line)}
  .connector.on{background:var(--accent)}

  /* lesson player */
  .player{max-width:720px;margin:0 auto}
  .pbar-wrap{height:12px;background:#0f1530;border:1px solid var(--line);border-radius:999px;overflow:hidden;margin:6px 0 18px}
  .pbar{height:100%;background:linear-gradient(90deg,#6ee7b7,#5b86ff);width:0;transition:width .35s}
  .teach{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:22px}
  .teach .kicker{font-size:12px;letter-spacing:.08em;text-transform:uppercase;color:var(--accent)}
  .teach h2{margin:6px 0 14px;font-size:21px;line-height:1.25}
  .analogy{background:rgba(91,134,255,.10);border-left:3px solid var(--accent2);border-radius:0 12px 12px 0;
    padding:12px 14px;color:#dbe6ff;font-size:14px;line-height:1.5;margin-bottom:14px}
  .teach ul{margin:0 0 14px;padding-left:20px}
  .teach li{margin:7px 0;line-height:1.5;font-size:14px}
  .trap{background:rgba(252,211,77,.10);border-left:3px solid var(--gold);border-radius:0 12px 12px 0;
    padding:12px 14px;color:#ffe9a8;font-size:13.5px;line-height:1.5}
  .trap b,.analogy b,.teach li b{color:#fff}
  .refs{margin-top:14px;border-top:1px solid var(--line);padding-top:14px}
  .refs .rtitle{font-size:12px;letter-spacing:.06em;text-transform:uppercase;color:var(--accent);margin-bottom:8px}
  .refs a{display:flex;align-items:center;gap:8px;padding:9px 12px;margin:6px 0;border:1px solid var(--line);
    border-radius:10px;background:rgba(91,134,255,.06);color:#dbe6ff;text-decoration:none;font-size:13.5px;line-height:1.4}
  .refs a:hover{background:rgba(91,134,255,.14);border-color:var(--accent2)}
  .refs a .ricon{flex:0 0 auto}
  .refs a .rext{margin-left:auto;flex:0 0 auto;opacity:.5;font-size:12px}

  .qcard{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:22px}
  .qtag{font-size:12px;color:var(--muted)}
  .qtext{font-weight:700;font-size:18px;margin:8px 0 16px;line-height:1.4}
  .qmedia img{max-width:100%;border:1px solid var(--line);border-radius:12px;margin-bottom:14px}
  .opt{display:flex;gap:12px;align-items:flex-start;padding:13px 15px;margin:9px 0;border:2px solid var(--line);
    border-radius:14px;background:#0f1530;cursor:pointer;transition:border-color .12s, background .12s}
  .opt:hover{border-color:var(--accent2)}
  .opt.sel{border-color:var(--accent2);background:rgba(91,134,255,.10)}
  .opt.correct{border-color:var(--good);background:rgba(31,158,109,.12)}
  .opt.wrong{border-color:#ef4444;background:rgba(239,68,68,.10)}
  .opt.miss{border-color:var(--good);border-style:dashed}
  .opt input{margin-top:3px;accent-color:var(--accent2)}
  .opt code{white-space:pre-wrap;font-family:ui-monospace,Menlo,Consolas,monospace;font-size:13px}
  .opt .okey{font-weight:800;margin-right:2px}

  .feedback{margin-top:16px;border-radius:14px;padding:14px 16px;display:none}
  .feedback.show{display:block}
  .feedback.ok{background:rgba(31,158,109,.12);border:1px solid var(--good)}
  .feedback.no{background:rgba(239,68,68,.10);border:1px solid #ef4444}
  .feedback .ftitle{font-weight:800;margin-bottom:6px;display:flex;align-items:center;gap:8px}
  .feedback .exp{font-size:13.5px;color:var(--muted);line-height:1.5}
  .ai-box{margin-top:10px;background:#0f1530;border:1px dashed var(--line);border-radius:10px;padding:10px 12px;
    font-size:13px;line-height:1.5;color:#dbe6ff;display:none;white-space:pre-wrap}
  .ai-box.show{display:block}

  .footer-actions{display:flex;justify-content:space-between;align-items:center;gap:10px;margin-top:18px}
  .btn{padding:12px 20px;border-radius:14px;border:1px solid var(--line);background:#0f1530;color:var(--txt);
    font-weight:800;cursor:pointer;font-size:15px}
  .btn:hover{border-color:var(--accent2)}
  .btn.primary{background:#123826;border-color:var(--good);color:#c8ffe8}
  .btn.ghost{background:transparent}
  .btn:disabled{opacity:.4;cursor:default}
  .btn.small{padding:7px 12px;font-size:13px;font-weight:700}

  /* results */
  .results{max-width:560px;margin:30px auto;text-align:center;background:var(--card);border:1px solid var(--line);
    border-radius:20px;padding:30px 24px}
  .results .big{font-size:54px}
  .results h2{margin:8px 0 4px}
  .res-row{display:flex;justify-content:center;gap:14px;margin:18px 0;flex-wrap:wrap}
  .res-stat{background:#0f1530;border:1px solid var(--line);border-radius:14px;padding:12px 18px;min-width:90px}
  .res-stat .n{font-size:24px;font-weight:800}
  .res-stat .k{font-size:12px;color:var(--muted)}

  /* modal */
  .modal-bg{position:fixed;inset:0;background:rgba(5,8,18,.7);display:none;place-items:center;z-index:20;padding:16px}
  .modal-bg.show{display:grid}
  .modal{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:22px;max-width:460px;width:100%}
  .modal h3{margin:0 0 12px}
  .modal label{display:block;font-size:13px;color:var(--muted);margin:10px 0 4px}
  .modal input,.modal select{width:100%;padding:10px;border-radius:10px;border:1px solid var(--line);
    background:#0f1530;color:var(--txt)}
  .modal .row{display:flex;gap:10px;justify-content:flex-end;margin-top:18px}
  .hint{font-size:12px;color:var(--muted);line-height:1.5}
  .hidden{display:none!important}
  /* material (.md) viewer */
  .modal.wide{max-width:820px;display:flex;flex-direction:column;max-height:88vh}
  .md-head{display:flex;align-items:center;gap:12px;margin-bottom:12px}
  .md-head h3{margin:0;flex:1;font-size:16px;line-height:1.3}
  .md-langtog{display:flex;gap:0;border:1px solid var(--line);border-radius:9px;overflow:hidden}
  .md-langtog button{background:transparent;border:none;color:var(--muted);padding:6px 11px;font-size:12px;cursor:pointer;border-right:1px solid var(--line)}
  .md-langtog button:last-child{border-right:none}
  .md-langtog button.on{background:var(--accent2);color:#fff}
  .mdwrap{overflow:auto;border:1px solid var(--line);border-radius:12px;background:#0c1228;padding:18px 20px}
  .mdbody{color:var(--txt);font-size:14px;line-height:1.6;word-wrap:break-word}
  .mdbody h1,.mdbody h2,.mdbody h3,.mdbody h4{line-height:1.3;margin:18px 0 8px;color:#fff}
  .mdbody h1{font-size:20px;border-bottom:1px solid var(--line);padding-bottom:6px}
  .mdbody h2{font-size:17px;border-bottom:1px solid var(--line);padding-bottom:4px}
  .mdbody h3{font-size:15px;color:var(--accent)}
  .mdbody h4{font-size:14px;color:var(--muted)}
  .mdbody p{margin:8px 0}
  .mdbody ul,.mdbody ol{margin:8px 0;padding-left:22px}
  .mdbody li{margin:4px 0}
  .mdbody code{background:rgba(91,134,255,.14);padding:1px 5px;border-radius:5px;font-size:12.5px}
  .mdbody pre{background:#070b18;border:1px solid var(--line);border-radius:10px;padding:12px;overflow:auto}
  .mdbody pre code{background:none;padding:0;font-size:12.5px;line-height:1.45}
  .mdbody blockquote{border-left:3px solid var(--accent2);margin:10px 0;padding:4px 14px;color:var(--muted);background:rgba(91,134,255,.06)}
  .mdbody table{border-collapse:collapse;width:100%;margin:12px 0;font-size:13px}
  .mdbody th,.mdbody td{border:1px solid var(--line);padding:7px 10px;text-align:left;vertical-align:top}
  .mdbody th{background:rgba(91,134,255,.10);color:#fff}
  .mdbody hr{border:none;border-top:1px solid var(--line);margin:16px 0}
  .mdbody a{color:var(--accent2)}
  .mdbody .md-hit{background:rgba(252,211,77,.18);border-radius:6px;animation:mdflash 2.4s ease-out}
  @keyframes mdflash{0%{background:rgba(252,211,77,.5)}100%{background:rgba(252,211,77,.10)}}
</style>
</head>
<body>
<header>
  <div class="hbar">
    <div class="brand"><span class="logo">🔥</span><span>FHIR Learn</span></div>
    <div class="stats">
      <span class="chip streak" id="chipStreak">🔥 0</span>
      <span class="chip xp" id="chipXp">⭐ 0 XP</span>
      <span class="chip due" id="chipDue">📅 0</span>
      <span class="chip concepts" id="chipConcepts" title="Conceitos consolidados">🧠 0</span>
      <button class="iconbtn" id="btnLang">🇬🇧/🇵🇹</button>
      <button class="iconbtn" id="btnSettings">⚙️</button>
    </div>
  </div>
</header>

<div class="container" id="app"></div>

<!-- settings modal -->
<div class="modal-bg" id="settingsModal">
  <div class="modal">
    <h3 id="setTitle">Configurações</h3>
    <label id="lblKey">Chave da API Anthropic (opcional — para "Explicar melhor")</label>
    <input type="password" id="apiKey" placeholder="sk-ant-..." autocomplete="off" />
    <label id="lblModel">Modelo</label>
    <select id="aiModel">
      <option value="claude-haiku-4-5-20251001">Haiku 4.5 (rápido/barato)</option>
      <option value="claude-sonnet-4-6">Sonnet 4.6 (mais detalhado)</option>
    </select>
    <p class="hint" id="setHint">A chave fica só no seu navegador (localStorage). Sem chave, o app funciona normalmente — só o botão de IA fica indisponível.</p>
    <div class="row">
      <button class="btn ghost small" id="btnReset">Zerar progresso</button>
      <button class="btn small" id="setClose">Fechar</button>
      <button class="btn primary small" id="setSave">Salvar</button>
    </div>
  </div>
</div>

<!-- material (.md) viewer modal -->
<div class="modal-bg" id="mdModal">
  <div class="modal wide">
    <div class="md-head">
      <h3 id="mdTitle">Material do curso</h3>
      <div class="md-langtog" id="mdLangTog">
        <button data-mode="PT">PT</button>
        <button data-mode="EN">EN</button>
        <button data-mode="BOTH" id="mdBothBtn">Ambos</button>
      </div>
      <button class="btn ghost small" id="mdClose">✕</button>
    </div>
    <div class="mdwrap"><div class="mdbody" id="mdBody"></div></div>
  </div>
</div>

<script>
/* ============================== i18n ============================== */
const T = {
  PT:{ready:'Prontidão para a prova',readySub:'Sua maestria estimada por unidade. Revise diariamente para subir.',
    reviewNow:'Revisar agora',reviewDue:n=>`Revisar ${n} pendente${n>1?'s':''}`,noDue:'Nada para revisar hoje 🎉',
    unit:'Unidade',locked:'Conclua a lição anterior',start:'Começar',continue:'Continuar',check:'Verificar',
    correct:'Correto!',incorrect:'Quase lá',explainMore:'💡 Explicar melhor (IA)',thinking:'Pensando…',
    lessonDone:'Lição concluída!',reviewDoneT:'Revisão concluída!',xpEarned:'XP ganho',accuracy:'Acerto',
    mastered:'Itens revisados',backHome:'Voltar à trilha',pick:'Selecione uma resposta.',deepenTitle:'Aprofundar no material oficial',
    selectAll:'(selecione todas)',crownsLeft:n=>`${n} para dominar`,dueReview:'Revisão do dia',
    needKey:'Adicione sua chave da API nas Configurações ⚙️ para usar a IA.',aiErr:'Erro ao chamar a IA: ',
    concepts:'Conceitos consolidados',dominated:'Questões dominadas',consolidation:'Consolidação do conhecimento',
    checkpoint:'Prova da Unidade',cpLocked:'Conclua as lições da unidade primeiro',
    cpName:'Prova da Unidade',cpIntro:n=>`Todas as ${n} questões da unidade, embaralhadas e sem dicas. Uma tentativa por questão.`,
    cpStart:'Iniciar prova',cpNeed:p=>`Acerte ${p}% para dominar a unidade.`,
    cpDoneT:'Prova da Unidade',cpPassed:'Unidade Dominada! 🏆',cpFailed:'Quase! Refaça para dominar a unidade.',
    masteredBadge:'DOMINADA',retryCp:'Refazer prova'},
  EN:{ready:'Exam readiness',readySub:'Your estimated mastery per unit. Review daily to climb.',
    reviewNow:'Review now',reviewDue:n=>`Review ${n} due`,noDue:'Nothing to review today 🎉',
    unit:'Unit',locked:'Finish the previous lesson',start:'Start',continue:'Continue',check:'Check',
    correct:'Correct!',incorrect:'Not quite',explainMore:'💡 Explain better (AI)',thinking:'Thinking…',
    lessonDone:'Lesson complete!',reviewDoneT:'Review complete!',xpEarned:'XP earned',accuracy:'Accuracy',
    mastered:'Items reviewed',backHome:'Back to path',pick:'Select an answer.',deepenTitle:'Go deeper in the official spec',
    selectAll:'(select all)',crownsLeft:n=>`${n} to master`,dueReview:'Daily review',
    needKey:'Add your API key in Settings ⚙️ to use AI.',aiErr:'AI call error: ',
    concepts:'Concepts consolidated',dominated:'Questions mastered',consolidation:'Knowledge consolidation',
    checkpoint:'Unit Test',cpLocked:'Finish the unit lessons first',
    cpName:'Unit Test',cpIntro:n=>`All ${n} unit questions, shuffled and hint-free. One attempt per question.`,
    cpStart:'Start test',cpNeed:p=>`Score ${p}% to master the unit.`,
    cpDoneT:'Unit Test',cpPassed:'Unit Mastered! 🏆',cpFailed:'Almost! Retry to master the unit.',
    masteredBadge:'MASTERED',retryCp:'Retry test'}
};
let LANG = localStorage.getItem('flearn_lang') || 'PT';
const t = k => T[LANG][k];
const L = (o,base) => LANG==='EN' ? (o[base+'En']??o[base+'Pt']) : (o[base+'Pt']??o[base+'En']);

/* ============================== storage ============================== */
const SRS_K='flearn_srs', GAM_K='flearn_gam';
const ld=(k,d)=>{try{return JSON.parse(localStorage.getItem(k))??d}catch{return d}};
const sv=(k,v)=>localStorage.setItem(k,JSON.stringify(v));
let SRS=ld(SRS_K,{});
let GAM=ld(GAM_K,{xp:0,streak:0,lastDay:null,crowns:{},mastered:{}});
GAM.crowns=GAM.crowns||{}; GAM.mastered=GAM.mastered||{};
const today=()=>new Date().toISOString().slice(0,10);
const now=()=>Date.now();
const DAY=86400000;

/* ============================== SRS (SM-2 lite) ============================== */
function srsOf(key){ return SRS[key] || {ease:2.5,interval:0,reps:0,lapses:0,due:0,lastGrade:null}; }
function applyGrade(key,correct){
  const s=srsOf(key);
  const q=correct?5:2;
  if(q<3){ s.reps=0; s.interval=1; s.lapses++; }
  else{
    if(s.reps===0) s.interval=1;
    else if(s.reps===1) s.interval=3;
    else s.interval=Math.round(s.interval*s.ease);
    s.reps++;
  }
  s.ease=Math.max(1.3, s.ease + (0.1-(5-q)*(0.08+(5-q)*0.02)));
  s.due=now()+s.interval*DAY;
  s.lastGrade=q;
  SRS[key]=s; sv(SRS_K,SRS);
}
// strength 0..1 used for mastery rings
function strength(key){
  const s=SRS[key]; if(!s||s.reps===0) return 0;
  let base=Math.min(s.reps,3)/3;               // up to 3 good reps = full
  if(s.due && s.due<now()) base*=0.6;          // overdue decays
  if(s.lastGrade!==null && s.lastGrade<3) base*=0.4;
  return base;
}
function dueKeys(allKeys){ return allKeys.filter(k=>{const s=SRS[k];return s&&s.reps>0&&s.due<=now()}); }

/* ============================== gamification ============================== */
function addXp(n){ GAM.xp+=n; sv(GAM_K,GAM); }
function bumpStreak(){
  const d=today();
  if(GAM.lastDay===d) return;
  const y=new Date(Date.now()-DAY).toISOString().slice(0,10);
  GAM.streak = (GAM.lastDay===y) ? GAM.streak+1 : 1;
  GAM.lastDay=d; sv(GAM_K,GAM);
}

/* ============================== data load ============================== */
let PATHS=[], PATH=null, QMAP={};  // QMAP["module1_q1#1"] = question obj
async function loadAll(){
  const man=await (await fetch('data/modules.json')).json();
  for(const m of (man.modules||[])){
    const p=await (await fetch(m.file)).json();
    p.key=m.key;
    PATHS.push(p);
    for(const [pref,file] of Object.entries(p.sources)){
      const qs=await (await fetch(file)).json();
      qs.forEach(q=>{ QMAP[`${pref}#${q.id}`]=q; });
    }
  }
  const saved=localStorage.getItem('flearn_module');
  PATH = PATHS.find(p=>p.key===saved) || PATHS[0];
}
// keys of the CURRENT module
function allItemKeys(){ const a=[]; PATH.units.forEach(u=>u.lessons.forEach(l=>a.push(...l.items))); return a; }
// keys across ALL modules (for global daily review)
function globalItemKeys(){ const a=[]; PATHS.forEach(p=>p.units.forEach(u=>u.lessons.forEach(l=>a.push(...l.items)))); return a; }
function flatLessons(){ const a=[]; PATH.units.forEach(u=>u.lessons.forEach(l=>a.push({unit:u,lesson:l}))); return a; }
function moduleMastery(p){ const ks=[]; p.units.forEach(u=>u.lessons.forEach(l=>ks.push(...l.items))); return ks.length?ks.reduce((a,k)=>a+strength(k),0)/ks.length:0; }

/* crown level 0..3 for a lesson */
function crownLevel(lesson){
  const reps=lesson.items.map(k=>SRS[k]?.reps||0);
  const minR=Math.min(...reps);
  const minE=Math.min(...lesson.items.map(k=>SRS[k]?.ease||0));
  if(minR>=3 && minE>=2.3) return 3;
  if(minR>=2) return 2;
  if(minR>=1) return 1;
  return 0;
}
function lessonUnlocked(idx){
  if(idx===0) return true;
  const prev=flatLessons()[idx-1].lesson;
  return crownLevel(prev)>=1;
}
function unitMastery(u){
  const ks=[]; u.lessons.forEach(l=>ks.push(...l.items));
  if(!ks.length) return 0;
  return ks.reduce((a,k)=>a+strength(k),0)/ks.length;
}
function overallMastery(){
  const ks=allItemKeys();
  return ks.reduce((a,k)=>a+strength(k),0)/ks.length;
}

/* ============================== checkpoints & consolidation ============================== */
const CP_PASS=0.8;                                   // limiar para "Unidade Dominada"
function unitItems(u){ const a=[]; u.lessons.forEach(l=>a.push(...l.items)); return a; }
function unitCheckpointItems(u){ return (u.checkpoint&&u.checkpoint.items&&u.checkpoint.items.length)? u.checkpoint.items : unitItems(u); }
function unitDone(u){ return u.lessons.every(l=>crownLevel(l)>=1); }      // checkpoint destrava com todas as lições feitas
function umId(p,u){ return `${p.key}:${u.id}`; }
function isUnitMastered(u){ return !!GAM.mastered[umId(PATH,u)]; }
function setUnitMastered(u){ GAM.mastered[umId(PATH,u)]=true; sv(GAM_K,GAM); }
// consolidação: conceito = lição com coroa ≥🥈 ; questão dominada = item revisado ≥2× e último acerto
function itemDominated(k){ const s=SRS[k]; return !!(s&&s.reps>=2&&s.lastGrade>=3); }
function lessonConsolidated(l){ return crownLevel(l)>=2; }
function countConcepts(){ let d=0,t=0; PATHS.forEach(p=>p.units.forEach(u=>u.lessons.forEach(l=>{t++; if(lessonConsolidated(l))d++;}))); return {d,t}; }
function countItems(){ const ks=globalItemKeys(); return {d:ks.filter(itemDominated).length,t:ks.length}; }

function shuffle(a){ for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; } return a; }

}

function renderQuestion(){
  renderHeader();
  if(SESS.idx>=SESS.queue.length) return renderResults();
  const key=SESS.queue[SESS.idx];
  const q=QMAP[key];
  const isMulti=q.type==='multi' || q.options.filter(o=>o.correct).length>1;
  const prog=Math.round((SESS.idx/SESS.total)*100);

  let media='';
  if(q.media?.length){
    media='<div class="qmedia">'+q.media.filter(m=>m.type==='image'&&m.src)
      .map(m=>`<img src="${m.src}" alt="${LANG==='EN'?(m.altEn||''):(m.altPt||'')}" loading="lazy">`).join('')+'</div>';

        <button class="btn ghost" id="bExit">✕ ${t('backHome')}</button>
        <button class="btn primary" id="bCheck">${t('check')}</button>
      </div>
    </div>`;

  const optEls=[...document.querySelectorAll('.opt')];
  optEls.forEach(el=>el.onclick=()=>{
    const inp=el.querySelector('input');
    if(inp.disabled) return;
    if(!isMulti){ optEls.forEach(o=>o.classList.remove('sel')); document.querySelectorAll('input[name=opt]').forEach(i=>i.checked=false); }
    inp.checked=isMulti?!inp.checked:true;
    el.classList.toggle('sel',inp.checked);
  });
  document.getElementById('bExit').onclick=renderHome;
  document.getElementById('bCheck').onclick=()=>checkAnswer(key,q,isMulti);
}

function checkAnswer(key,q,isMulti){
  const chosen=[...document.querySelectorAll('input[name=opt]:checked')].map(i=>i.value).sort();
  if(!chosen.length){ alert(t('pick')); return; }
  const right=q.options.filter(o=>o.correct).map(o=>o.key).sort();
  const correct = chosen.length===right.length && chosen.every((v,i)=>v===right[i]);
  const rset=new Set(right), cset=new Set(chosen);

  document.querySelectorAll('.opt').forEach(el=>{
    const k=el.dataset.key; el.querySelector('input').disabled=true; el.style.cursor='default';
    if(rset.has(k)&&cset.has(k)) el.classList.add('correct');
    else if(cset.has(k)&&!rset.has(k)) el.classList.add('wrong');
    else if(rset.has(k)&&!cset.has(k)) el.classList.add('miss');
  });

  // SRS + XP: lock grade on FIRST encounter of this item in the session
  const firstTime=!SESS.seen.has(key);
  if(firstTime){
    SESS.seen.add(key);
    SESS.answered++;
    applyGrade(key,correct);
    if(correct){ SESS.correctFirst++; SESS.xp+=10; addXp(10); }
  } else if(correct){ SESS.xp+=2; addXp(2); }

  // wrong → requeue at end (Duolingo style), grade already locked.
  // checkpoint = modo prova: uma tentativa por questão, sem reenfileirar.
  if(!correct && SESS.mode!=='checkpoint') SESS.queue.push(key);

  const fb=document.getElementById('fb');
  fb.className='feedback show '+(correct?'ok':'no');
  document.getElementById('fbTitle').innerHTML=(correct?'✅ ':'❌ ')+(correct?t('correct'):t('incorrect'));
  document.getElementById('fbExp').innerHTML=LANG==='EN'?(q.explanationEn||''):(q.explanationPt||'');
  document.getElementById('bAi').onclick=()=>aiExplain(q,chosen,right);

  const btn=document.getElementById('bCheck');
  btn.textContent=t('continue')+' →';
  btn.onclick=()=>{ SESS.idx++; renderQuestion(); };
  renderHeader();
}

/* ============================== AI explain (optional) ============================== */
async function aiExplain(q,chosen,right){
  const key=localStorage.getItem('flearn_apikey');
  const box=document.getElementById('aiBox');
  box.className='ai-box show';
  if(!key){ box.textContent=t('needKey'); return; }
  box.textContent=t('thinking');
  const model=localStorage.getItem('flearn_aimodel')||'claude-haiku-4-5-20251001';
  const qtext=LANG==='EN'?q.qEn:q.qPt;
  const optTxt=q.options.map(o=>`${o.key}. ${LANG==='EN'?o.en:o.pt}${o.correct?' [CORRECT]':''}`).join('\n');
  const langName=LANG==='EN'?'English':'Brazilian Portuguese';
  const prompt=`You are an HL7 FHIR certification tutor. A student answered a quiz question.
Question: ${qtext}
Options:\n${optTxt}
Student chose: ${chosen.join(', ')}. Correct: ${right.join(', ')}.
In ${langName}, explain concisely (max 4 sentences) WHY the correct answer is right and why the student's choice was wrong if it differs. Ground it in FHIR fundamentals. No preamble.`;
  try{
    const res=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'content-type':'application/json','x-api-key':key,
        'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
      body:JSON.stringify({model,max_tokens:500,messages:[{role:'user',content:prompt}]})
    });
    const data=await res.json();
    if(data.error){ box.textContent=t('aiErr')+(data.error.message||JSON.stringify(data.error)); return; }
    box.textContent=(data.content||[]).map(c=>c.text||'').join('').trim()||'—';
  }catch(e){ box.textContent=t('aiErr')+e.message; }
}

/* ===================== material (.md) viewer ===================== */
const MDCACHE={};
function escHtml(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function mdInline(s){
  return s
    .replace(/`([^`]+)`/g,(m,c)=>`<code>${c}</code>`)
    .replace(/\*\*([^*]+)\*\*/g,'<strong>$1</strong>')
    .replace(/__([^_]+)__/g,'<strong>$1</strong>')
    .replace(/(^|[^*])\*([^*\n]+)\*/g,'$1<em>$2</em>')
    .replace(/\[([^\]]+)\]\(([^)]+)\)/g,'<a href="$2" target="_blank" rel="noopener noreferrer">$1</a>');
}
function mdToHtml(md){
  const lines=md.replace(/\r\n/g,'\n').split('\n');
  let html='',i=0,inCode=false,codeBuf='',listType=null;
  const closeList=()=>{ if(listType){html+=`</${listType}>`;listType=null;} };
  while(i<lines.length){
    const line=lines[i];
    if(/^```/.test(line)){
      if(!inCode){closeList();inCode=true;codeBuf='';}
      else{html+=`<pre><code>${escHtml(codeBuf)}</code></pre>`;inCode=false;}
      i++;continue;
    }
    if(inCode){codeBuf+=line+'\n';i++;continue;}
    if(/^\s*\|/.test(line) && i+1<lines.length && /-/.test(lines[i+1]) && /^\s*\|?[\s:|-]+\|/.test(lines[i+1])){
      closeList();
      const cells=l=>l.trim().replace(/^\||\|$/g,'').split('|').map(c=>mdInline(escHtml(c.trim())));
      const header=cells(line); i+=2; const rows=[];
      while(i<lines.length && /^\s*\|/.test(lines[i])){rows.push(cells(lines[i]));i++;}
      html+='<table><thead><tr>'+header.map(h=>`<th>${h}</th>`).join('')+'</tr></thead><tbody>'
        +rows.map(r=>'<tr>'+r.map(c=>`<td>${c}</td>`).join('')+'</tr>').join('')+'</tbody></table>';
      continue;
    }
    const h=line.match(/^(#{1,6})\s+(.*)$/);
    if(h){closeList();const lvl=h[1].length;html+=`<h${lvl}>${mdInline(escHtml(h[2].trim()))}</h${lvl}>`;i++;continue;}
    if(/^\s*([-*_])\1{2,}\s*$/.test(line)){closeList();html+='<hr>';i++;continue;}
    if(/^\s*>\s?/.test(line)){closeList();html+=`<blockquote>${mdInline(escHtml(line.replace(/^\s*>\s?/,'')))}</blockquote>`;i++;continue;}
    const ul=line.match(/^\s*[-*+]\s+(.*)$/);
    if(ul){if(listType!=='ul'){closeList();html+='<ul>';listType='ul';}html+=`<li>${mdInline(escHtml(ul[1]))}</li>`;i++;continue;}
    const ol=line.match(/^\s*\d+\.\s+(.*)$/);
    if(ol){if(listType!=='ol'){closeList();html+='<ol>';listType='ol';}html+=`<li>${mdInline(escHtml(ol[1]))}</li>`;i++;continue;}
    if(/^\s*$/.test(line)){closeList();i++;continue;}
    closeList();
    let para=line;i++;
    const special=l=>/^\s*$/.test(l)||/^(#{1,6})\s/.test(l)||/^```/.test(l)||/^\s*[-*+]\s/.test(l)||/^\s*\d+\.\s/.test(l)||/^\s*\|/.test(l)||/^\s*>/.test(l);
    while(i<lines.length && !special(lines[i])){para+=' '+lines[i];i++;}
    html+=`<p>${mdInline(escHtml(para))}</p>`;
  }
  if(inCode) html+=`<pre><code>${escHtml(codeBuf)}</code></pre>`;
  closeList();
  return html;
}
/* O material .md é bilíngue (EN seguido de PT, ou "EN / PT" na mesma linha).
   Filtro heurístico p/ mostrar só um idioma: detecta PT por acentos/palavras comuns. */
function mdStrip(line){ return line.replace(/^\s*(?:[-*+]\s+|\d+\.\s+|#{1,6}\s+|>\s?)?/,'').trim(); }
function mdLangOf(text){
  const t=text.replace(/`[^`]*`/g,' ').replace(/https?:\/\/\S+/g,' ');
  if(!/[A-Za-zÀ-ÿ]/.test(t)) return 'NEU';
  if(/[áàâãéêíóôõúüç]/i.test(t)) return 'PT';
  if(/\b(você|voce|não|nao|são|sao|também|está|da|do|das|dos|na|no|nas|nos|para|com|uma|por|que|seu|sua|pela|pelo|ção|ões|qualquer|conformidade)\b/i.test(t)) return 'PT';
  return 'EN';
}
function mdSplitInline(line,mode){
  const m=line.match(/^(\s*(?:[-*+]\s+|\d+\.\s+|#{1,6}\s+|>\s?)?)([\s\S]*)$/);
  const prefix=m[1], rest=m[2];
  if(rest.includes(' / ')){
    const parts=rest.split(' / ');
    if(parts.length===2){
      const a=mdLangOf(parts[0]), b=mdLangOf(parts[1]);
      if(a!==b && a!=='NEU' && b!=='NEU'){
        if(mode==='EN') return prefix+(a==='EN'?parts[0]:parts[1]);
        if(mode==='PT') return prefix+(a==='PT'?parts[0]:parts[1]);
      }
    }
  }
  return line;
}
function mdFilterBilingual(md,mode){
  if(mode==='BOTH') return md;
  const lines=md.replace(/\r\n/g,'\n').split('\n');
  const isCode=[]; let inC=false;
  for(const l of lines){ const f=/^```/.test(l); isCode.push(inC||f); if(f) inC=!inC; }
  const skip=lines.map((l,i)=> isCode[i] || /^\s*$/.test(l) || /^```/.test(l));
  const isHead=lines.map(l=>/^\s*#{1,6}\s/.test(l));
  const cls=lines.map((l,i)=> skip[i]?'SKIP':mdLangOf(mdStrip(l)));
  const other = mode==='PT'?'EN':'PT';
  const near=(i,d)=>{ for(let j=i+d;j>=0&&j<lines.length;j+=d){ if(!skip[j]) return cls[j]; } return null; };
  const out=[];
  for(let i=0;i<lines.length;i++){
    if(skip[i]){ out.push(lines[i]); continue; }
    const split=mdSplitInline(lines[i],mode);
    if(split!==lines[i]){ out.push(split); continue; }
    if(isHead[i]){ out.push(lines[i]); continue; }        // nunca remove títulos
    if(cls[i]===other && (near(i,-1)===mode || near(i,1)===mode)) continue; // remove a tradução
    out.push(lines[i]);
  }
  return out.join('\n');
}
const MDVIEW={url:'',anchor:'',mode:'PT'};
function mdRender(){
  const body=$('mdBody');
  body.innerHTML=mdToHtml(mdFilterBilingual(MDCACHE[MDVIEW.url]||'', MDVIEW.mode));
  [...$('mdLangTog').children].forEach(b=>b.classList.toggle('on', b.dataset.mode===MDVIEW.mode));
  body.parentElement.scrollTop=0;
  if(MDVIEW.anchor){
    const want=MDVIEW.anchor.trim().toLowerCase();
    const hit=[...body.querySelectorAll('h1,h2,h3,h4,h5,h6')].find(el=>el.textContent.toLowerCase().includes(want));
    if(hit){ hit.classList.add('md-hit'); hit.scrollIntoView({block:'start'}); }
  }
}
async function openMaterial(url,anchor,title){
  const body=$('mdBody');
  MDVIEW.url=url; MDVIEW.anchor=anchor; MDVIEW.mode=LANG;
  $('mdTitle').textContent=title||(LANG==='EN'?'Course material':'Material do curso');
  $('mdBothBtn').textContent=LANG==='EN'?'Both':'Ambos';
  $('mdModal').classList.add('show');
  body.innerHTML=`<p>${LANG==='EN'?'Loading…':'Carregando…'}</p>`;
  try{
    if(!MDCACHE[url]) MDCACHE[url]=await (await fetch(url)).text();
  }catch(e){
    body.innerHTML=`<p>⚠️ ${LANG==='EN'?'Could not load the material file':'Não foi possível carregar o arquivo do material'} (<code>${escHtml(url)}</code>).</p>
      <p class="hint">${LANG==='EN'?'Serve the project from the repository root so the .md files are reachable: <code>python -m http.server</code> at the repo root, then open <code>/tests/learn.html</code>.':'Sirva o projeto a partir da raiz do repositório para que os arquivos .md fiquem acessíveis: <code>python -m http.server</code> na raiz e abra <code>/tests/learn.html</code>.'}</p>`;
    return;
  }
  mdRender();
}
$('mdLangTog').onclick=e=>{ const b=e.target.closest('button'); if(!b)return; MDVIEW.mode=b.dataset.mode; mdRender(); };
$('mdClose').onclick=()=>$('mdModal').classList.remove('show');

  $('aiModel').value=localStorage.getItem('flearn_aimodel')||'claude-haiku-4-5-20251001';
  $('settingsModal').classList.add('show'); };
$('setClose').onclick=()=>$('settingsModal').classList.remove('show');
$('setSave').onclick=()=>{ const k=$('apiKey').value.trim();

$('btnReset').onclick=()=>{ if(!confirm(LANG==='EN'?'Reset ALL progress, XP and streak?':'Zerar TODO o progresso, XP e streak?'))return;
  localStorage.removeItem(SRS_K); localStorage.removeItem(GAM_K);
  SRS={}; GAM={xp:0,streak:0,lastDay:null,crowns:{}}; $('settingsModal').classList.remove('show'); renderHome(); };
